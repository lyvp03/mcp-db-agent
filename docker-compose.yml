services:
  postgres:
    image: postgres:15
    container_name: mcp-db-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: telco
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
